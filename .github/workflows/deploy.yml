name: Deploy Next.js to EC2

on:
  push:
    branches:
      - main # Runs this script every time you push to the 'main' branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Navigate to your project folder
            cd /home/ubuntu/fe/job-track-ai
            
            # 2. Pull the latest code from GitHub
            git pull origin main
            
            # 3. Install any new dependencies
            npm install
            
            # 4. Build the new Next.js production files
            npm run build
            
            # 5. Restart the server with PM2 to apply changes
            pm2 restart track-job-fe --update-env